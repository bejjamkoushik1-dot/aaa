<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — R.V.R &amp; J.C College of Engineering Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">RVRJC Library</a>
    <div id="nav-links" class="nav-links"></div>
  </nav>
  <main class="form-page">
    <h1>Set new password</h1>
    <p class="text-muted mb-2">Enter your new password below. It must be at least 6 characters.</p>
    <form id="reset-form">
      <input type="hidden" id="token" name="token" value="">
      <div class="form-group">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" required autocomplete="new-password" minlength="6" placeholder="At least 6 characters">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" minlength="6" placeholder="Same as above">
      </div>
      <p id="form-error" class="form-error hidden"></p>
      <p id="form-success" class="form-success hidden"></p>
      <button type="submit" class="btn btn-primary" id="submit-btn">Update password</button>
    </form>
    <p class="form-footer"><a href="/login">Back to log in</a></p>
  </main>
  <script src="/js/auth.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var tokenEl = document.getElementById('token');
      if (tokenEl) tokenEl.value = token || '';

      if (!token) {
        document.getElementById('form-error').textContent = 'Missing or invalid reset link. Please request a new one from the forgot password page.';
        document.getElementById('form-error').classList.remove('hidden');
        document.getElementById('reset-form').querySelector('button[type="submit"]').disabled = true;
        return;
      }

      var form = document.getElementById('reset-form');
      var errEl = document.getElementById('form-error');
      var successEl = document.getElementById('form-success');
      var submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        errEl.classList.add('hidden');
        successEl.classList.add('hidden');
        var newPw = document.getElementById('newPassword').value;
        var confirmPw = document.getElementById('confirmPassword').value;
        if (newPw !== confirmPw) {
          errEl.textContent = 'Passwords do not match.';
          errEl.classList.remove('hidden');
          return;
        }
        if (newPw.length < 6) {
          errEl.textContent = 'Password must be at least 6 characters.';
          errEl.classList.remove('hidden');
          return;
        }
        submitBtn.disabled = true;
        fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, newPassword: newPw }),
          credentials: 'include'
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            submitBtn.disabled = false;
            if (data.error) {
              errEl.textContent = data.error;
              errEl.classList.remove('hidden');
              return;
            }
            successEl.textContent = data.message || 'Password updated. You can log in now.';
            successEl.classList.remove('hidden');
            form.reset();
            setTimeout(function() { window.location.href = '/login'; }, 2000);
          })
          .catch(function() {
            submitBtn.disabled = false;
            errEl.textContent = 'Something went wrong. Please try again.';
            errEl.classList.remove('hidden');
          });
      });
    })();
  </script>
</body>
</html>
