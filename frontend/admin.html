<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — R.V.R &amp; J.C College of Engineering Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">RVRJC Library</a>
    <div id="nav-links" class="nav-links"></div>
  </nav>
  <main class="container">
    <h1 class="page-title">Admin panel</h1>
    <p id="access-denied" class="text-muted hidden">Admin access required. Please log in as an admin.</p>
    <div id="admin-content" class="hidden">
      <section class="admin-stats mb-2">
        <div class="card-grid stats-grid">
          <div class="card">
            <h3>Users</h3>
            <p class="stat-value" id="stat-users">—</p>
          </div>
          <div class="card">
            <h3>Books</h3>
            <p class="stat-value" id="stat-books">—</p>
          </div>
          <div class="card">
            <h3>Active reservations</h3>
            <p class="stat-value" id="stat-reservations">—</p>
          </div>
        </div>
      </section>
      <section class="admin-tabs">
        <div class="tab-buttons">
          <button type="button" class="btn btn-secondary tab-btn active" data-tab="books">Books</button>
          <button type="button" class="btn btn-secondary tab-btn" data-tab="users">Users</button>
          <button type="button" class="btn btn-secondary tab-btn" data-tab="reservations">Reservations</button>
        </div>
        <div id="tab-books" class="tab-panel active">
          <div class="tab-header">
            <h2>Manage books</h2>
            <button type="button" class="btn btn-primary" id="btn-add-book">Add book</button>
          </div>
          <div class="table-wrap mt-1">
            <table id="admin-books-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Author</th>
                  <th>Category</th>
                  <th>Available</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="admin-books-body"></tbody>
            </table>
          </div>
        </div>
        <div id="tab-users" class="tab-panel">
          <h2>Users</h2>
          <div class="table-wrap mt-1">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Admin</th>
                  <th>Joined</th>
                </tr>
              </thead>
              <tbody id="admin-users-body"></tbody>
            </table>
          </div>
        </div>
        <div id="tab-reservations" class="tab-panel">
          <h2>Active reservations</h2>
          <div class="table-wrap mt-1">
            <table>
              <thead>
                <tr>
                  <th>User</th>
                  <th>Book</th>
                  <th>Booked on</th>
                  <th>Due</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="admin-reservations-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="due-date-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Adjust due date</h3>
        <button type="button" class="modal-close" id="due-date-modal-close">&times;</button>
      </div>
      <form id="due-date-form">
        <input type="hidden" id="due-date-reservation-id">
        <div class="form-group">
          <label for="due-date-input">New due date</label>
          <input type="date" id="due-date-input" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="due-date-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Update</button>
        </div>
      </form>
    </div>
  </div>

  <div id="book-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="book-modal-title">Add book</h3>
        <button type="button" class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="book-form">
        <input type="hidden" id="book-id" name="id">
        <div class="form-group">
          <label for="book-title">Title</label>
          <input type="text" id="book-title" name="title" required>
        </div>
        <div class="form-group">
          <label for="book-author">Author</label>
          <input type="text" id="book-author" name="author" required>
        </div>
        <div class="form-group">
          <label for="book-isbn">ISBN</label>
          <input type="text" id="book-isbn" name="isbn">
        </div>
        <div class="form-group">
          <label for="book-description">Description</label>
          <input type="text" id="book-description" name="description">
        </div>
        <div class="form-group">
          <label for="book-category">Category (e.g. Syllabus – CSE, Coding – Java)</label>
          <input type="text" id="book-category" name="category">
        </div>
        <div class="form-group">
          <label for="book-quantity">Quantity</label>
          <input type="number" id="book-quantity" name="quantity" value="1" min="0">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const accessDenied = document.getElementById('access-denied');
    const adminContent = document.getElementById('admin-content');
    const bookModal = document.getElementById('book-modal');
    const bookForm = document.getElementById('book-form');
    const modalClose = document.getElementById('modal-close');
    const modalCancel = document.getElementById('modal-cancel');
    const btnAddBook = document.getElementById('btn-add-book');

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s == null ? '' : s;
      return div.innerHTML;
    }

    async function init() {
      const user = await getCurrentUser();
      if (!user || !user.isAdmin) {
        accessDenied.classList.remove('hidden');
        return;
      }
      adminContent.classList.remove('hidden');
      await loadStats();
      await loadBooks();
      await loadUsers();
      await loadReservations();
      setupTabs();
      setupBookModal();
    }

    async function loadStats() {
      const res = await fetch('/api/admin/stats', { credentials: 'include' });
      if (!res.ok) return;
      const s = await res.json();
      document.getElementById('stat-users').textContent = s.users;
      document.getElementById('stat-books').textContent = s.books;
      document.getElementById('stat-reservations').textContent = s.activeReservations;
    }

    async function loadBooks() {
      const res = await fetch('/api/admin/books', { credentials: 'include' });
      if (!res.ok) return;
      const books = await res.json();
      const tbody = document.getElementById('admin-books-body');
      tbody.innerHTML = books.map(b => `
        <tr>
          <td>${escapeHtml(b.title)}</td>
          <td>${escapeHtml(b.author)}</td>
          <td>${escapeHtml(b.category || '')}</td>
          <td>${b.available ?? b.quantity} / ${b.quantity}</td>
          <td>
            <button type="button" class="btn btn-secondary btn-edit-book" data-id="${b.id}">Edit</button>
            <button type="button" class="btn btn-secondary btn-delete-book" data-id="${b.id}">Delete</button>
          </td>
        </tr>
      `).join('');
      tbody.querySelectorAll('.btn-edit-book').forEach(btn => {
        btn.addEventListener('click', () => openBookModal(parseInt(btn.dataset.id)));
      });
      tbody.querySelectorAll('.btn-delete-book').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this book? Reservations will be removed.')) return;
          const id = parseInt(btn.dataset.id);
          const r = await fetch(`/api/admin/books/${id}`, { method: 'DELETE', credentials: 'include' });
          if (r.ok) loadBooks();
        });
      });
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users', { credentials: 'include' });
      if (!res.ok) return;
      const users = await res.json();
      document.getElementById('admin-users-body').innerHTML = users.map(u => `
        <tr>
          <td>${escapeHtml(u.name)}</td>
          <td>${escapeHtml(u.email)}</td>
          <td>${u.is_admin ? 'Yes' : '—'}</td>
          <td>${new Date(u.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
    }

    async function loadReservations() {
      const res = await fetch('/api/admin/reservations', { credentials: 'include' });
      if (!res.ok) return;
      const rows = await res.json();
      const tbody = document.getElementById('admin-reservations-body');
      tbody.innerHTML = rows.map(r => {
        const due = r.due_date ? new Date(r.due_date) : null;
        const dueStr = due ? due.toISOString().slice(0, 10) : '';
        return `
        <tr>
          <td>${escapeHtml(r.user_name)} (${escapeHtml(r.user_email)})</td>
          <td>${escapeHtml(r.title)} — ${escapeHtml(r.author)}</td>
          <td>${r.reserved_at ? new Date(r.reserved_at).toLocaleDateString() : '—'}</td>
          <td>${r.due_date ? new Date(r.due_date).toLocaleDateString() : '—'}</td>
          <td>
            <button type="button" class="btn btn-secondary btn-adjust-due" data-id="${r.id}" data-due="${dueStr}">Adjust date</button>
            <button type="button" class="btn btn-secondary btn-unreserve" data-id="${r.id}">Unreserve</button>
          </td>
        </tr>
      `;
      }).join('');

      tbody.querySelectorAll('.btn-adjust-due').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('due-date-reservation-id').value = btn.dataset.id;
          document.getElementById('due-date-input').value = btn.dataset.due || '';
          document.getElementById('due-date-modal').classList.remove('hidden');
        });
      });
      tbody.querySelectorAll('.btn-unreserve').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.id);
          if (!confirm('Mark this reservation as returned and free up the book?')) return;
          const r = await fetch(`/api/admin/reservations/${id}/unreserve`, {
            method: 'POST',
            credentials: 'include'
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok || !data.success) {
            alert(data.error || 'Failed to unreserve.');
            return;
          }
          await loadReservations();
          await loadStats();
        });
      });
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
      });
    }

    function setupBookModal() {
      btnAddBook.addEventListener('click', () => openBookModal(null));
      modalClose.addEventListener('click', closeBookModal);
      modalCancel.addEventListener('click', closeBookModal);
      bookModal.addEventListener('click', (e) => { if (e.target === bookModal) closeBookModal(); });
      bookForm.addEventListener('submit', saveBook);

      const dueDateModal = document.getElementById('due-date-modal');
      const dueDateForm = document.getElementById('due-date-form');
      document.getElementById('due-date-modal-close').addEventListener('click', () => dueDateModal.classList.add('hidden'));
      document.getElementById('due-date-cancel').addEventListener('click', () => dueDateModal.classList.add('hidden'));
      dueDateModal.addEventListener('click', (e) => { if (e.target === dueDateModal) dueDateModal.classList.add('hidden'); });
      dueDateForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('due-date-reservation-id').value;
        const dateVal = document.getElementById('due-date-input').value;
        if (!dateVal) return;
        const dueDate = new Date(dateVal + 'T12:00:00Z').toISOString();
        const res = await fetch(`/api/admin/reservations/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ due_date: dueDate }),
          credentials: 'include'
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { alert(data.error || 'Failed to update.'); return; }
        dueDateModal.classList.add('hidden');
        loadReservations();
      });
    }

    async function openBookModal(id) {
      document.getElementById('book-modal-title').textContent = id ? 'Edit book' : 'Add book';
      document.getElementById('book-id').value = id || '';
      if (id) {
        const res = await fetch(`/api/books/${id}`, { credentials: 'include' });
        const b = await res.json();
        document.getElementById('book-title').value = b.title || '';
        document.getElementById('book-author').value = b.author || '';
        document.getElementById('book-isbn').value = b.isbn || '';
        document.getElementById('book-description').value = b.description || '';
        document.getElementById('book-category').value = b.category || '';
        document.getElementById('book-quantity').value = b.quantity || 1;
      } else {
        bookForm.reset();
        document.getElementById('book-quantity').value = 1;
      }
      bookModal.classList.remove('hidden');
    }

    function closeBookModal() {
      bookModal.classList.add('hidden');
    }

    async function saveBook(e) {
      e.preventDefault();
      const id = document.getElementById('book-id').value;
      const body = {
        title: document.getElementById('book-title').value.trim(),
        author: document.getElementById('book-author').value.trim(),
        isbn: document.getElementById('book-isbn').value.trim() || null,
        description: document.getElementById('book-description').value.trim() || null,
        category: document.getElementById('book-category').value.trim() || null,
        quantity: parseInt(document.getElementById('book-quantity').value, 10) || 1
      };
      const url = id ? `/api/admin/books/${id}` : '/api/admin/books';
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        credentials: 'include'
      });
      if (!res.ok) {
        alert('Failed to save.');
        return;
      }
      closeBookModal();
      loadBooks();
      loadStats();
    }

    init();
  </script>
</body>
</html>
