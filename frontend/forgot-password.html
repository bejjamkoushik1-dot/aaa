<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — R.V.R &amp; J.C College of Engineering Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">RVRJC Library</a>
    <div id="nav-links" class="nav-links"></div>
  </nav>
  <main class="form-page">
    <h1>Forgot password</h1>
    <p class="text-muted mb-2">Enter your email and we’ll send you a link to reset your password.</p>
    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="your@email.com">
      </div>
      <p id="form-error" class="form-error hidden"></p>
      <p id="form-success" class="form-success hidden"></p>
      <button type="submit" class="btn btn-primary" id="submit-btn">Send reset link</button>
    </form>
    <p class="form-footer"><a href="/login">Back to log in</a></p>
  </main>
  <script src="/js/auth.js"></script>
  <script>
    (function() {
      var form = document.getElementById('forgot-form');
      var errEl = document.getElementById('form-error');
      var successEl = document.getElementById('form-success');
      var submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        errEl.classList.add('hidden');
        successEl.classList.add('hidden');
        var email = document.getElementById('email').value.trim();
        if (!email) {
          errEl.textContent = 'Please enter your email.';
          errEl.classList.remove('hidden');
          return;
        }
        submitBtn.disabled = true;
        fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email }),
          credentials: 'include'
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            submitBtn.disabled = false;
            if (data.error) {
              errEl.textContent = data.error;
              errEl.classList.remove('hidden');
              if (data.devInfo) {
                var devInfoEl = document.createElement('div');
                devInfoEl.className = 'form-dev-info';
                devInfoEl.innerHTML = '<strong>Development Info:</strong> ' + data.devInfo;
                errEl.appendChild(devInfoEl);
              }
              return;
            }
            successEl.textContent = data.message || 'Check your email for a reset link. If you don’t see it, check spam.';
            successEl.classList.remove('hidden');
          })
          .catch(function() {
            submitBtn.disabled = false;
            errEl.textContent = 'Something went wrong. Please try again.';
            errEl.classList.remove('hidden');
          });
      });
    })();
  </script>
</body>
</html>
