<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — RVRJC Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .token-info {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    .success-message {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      padding: 1rem;
      border-radius: 6px;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">RVRJC Library</a>
    <div id="nav-links" class="nav-links"></div>
  </nav>
  <main class="form-page">
    <h1>Reset Your Password</h1>
    <p class="text-muted mb-2">Enter your new password below.</p>
    
    <div id="token-info" class="token-info">
      <strong>Reset Info:</strong>
      <div>Email: <span id="email-display"></span></div>
      <div>Token: <span id="token-display"></span></div>
    </div>

    <form id="reset-form">
      <input type="hidden" id="token" name="token">
      <input type="hidden" id="email" name="email">
      
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" name="newPassword" required minlength="6" placeholder="At least 6 characters">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Same as above">
      </div>
      
      <p id="form-error" class="form-error hidden"></p>
      <p id="form-success" class="success-message hidden"></p>
      
      <button type="submit" class="btn btn-primary" id="submit-btn">Update Password</button>
    </form>

    <p class="form-footer">
      <a href="/simple-forgot-password">← Generate new reset link</a> | 
      <a href="/login">Back to login</a>
    </p>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    // Get token and email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');
    
    // Display token info
    if (token && email) {
      document.getElementById('token').value = token;
      document.getElementById('email').value = email;
      document.getElementById('token-display').textContent = token.substring(0, 8) + '...';
      document.getElementById('email-display').textContent = email;
    } else {
      document.getElementById('form-error').textContent = 'Missing reset token or email. Please generate a new reset link.';
      document.getElementById('form-error').classList.remove('hidden');
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('form-error');
      const successEl = document.getElementById('form-success');
      const submitBtn = document.getElementById('submit-btn');
      
      // Clear previous messages
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');
      
      // Validation
      if (newPassword.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters long.';
        errorEl.classList.remove('hidden');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      
      try {
        const response = await fetch('/api/simple-reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: token,
            email: email,
            newPassword: newPassword
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          successEl.textContent = data.message || 'Password updated successfully! Redirecting to login...';
          successEl.classList.remove('hidden');
          document.getElementById('reset-form').style.display = 'none';
          
          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        } else {
          errorEl.textContent = data.error || 'Failed to reset password.';
          errorEl.classList.remove('hidden');
        }
      } catch (error) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
