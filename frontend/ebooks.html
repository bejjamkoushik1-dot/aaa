<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Books — Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">Library</a>
    <div id="nav-links" class="nav-links"></div>
  </nav>
  <main class="container">
    <h1 class="page-title">E-Books</h1>
    <p class="text-muted">Read these titles online. Open a book to read the e-book inside the page.</p>
    <div class="search-bar mt-1 mb-2">
      <input type="search" id="search-input" placeholder="Search e-books…" class="search-input" autocomplete="off">
    </div>
    <div id="ebooks-list" class="card-grid book-card-grid"></div>
    <p id="loading" class="text-muted">Loading…</p>
    <p id="no-books" class="text-muted hidden">No e-books available.</p>
  </main>
  <script src="/js/auth.js"></script>
  <script src="/js/covers.js"></script>
  <script>
    const listEl = document.getElementById('ebooks-list');
    const loadingEl = document.getElementById('loading');
    const noBooksEl = document.getElementById('no-books');

    function getSearchQ() {
      return (document.getElementById('search-input')?.value || '').trim();
    }

    async function load() {
      const q = getSearchQ();
      const url = q ? '/api/books?q=' + encodeURIComponent(q) : '/api/books';
      const res = await fetch(url, { credentials: 'include' });
      const books = await res.json();
      const withEbook = books.filter(b => b.ebook_path);
      loadingEl.classList.add('hidden');
      if (!withEbook.length) {
        noBooksEl.classList.remove('hidden');
        return;
      }
      const placeholder = typeof PLACEHOLDER_COVER !== 'undefined' ? PLACEHOLDER_COVER : '';
      listEl.innerHTML = withEbook.map(b => {
        const coverUrl = typeof getCoverUrl === 'function' ? (getCoverUrl(b) || placeholder) : placeholder;
        return `
        <div class="card book-card">
          <a href="/book/${b.id}#ebook" class="book-cover-wrap">
            <img src="${coverUrl || ''}" alt="" class="book-cover" onerror="this.src=typeof PLACEHOLDER_COVER!=='undefined'?PLACEHOLDER_COVER:''">
          </a>
          <div class="book-card-body">
            <h3><a href="/book/${b.id}#ebook" class="book-card-title">${escapeHtml(b.title)}</a></h3>
            <p class="meta">${escapeHtml(b.author)}</p>
            <div class="card-actions">
              <a href="/book/${b.id}#ebook" class="btn btn-primary">Read E-Book</a>
            </div>
          </div>
        </div>
      `;
      }).join('');
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s == null ? '' : s;
      return div.innerHTML;
    }

    document.getElementById('search-input')?.addEventListener('input', () => {
      clearTimeout(window._searchTimer);
      window._searchTimer = setTimeout(load, 200);
    });
    document.getElementById('search-input')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') load();
    });
    load();
  </script>
</body>
</html>
